server.port=8085

spring.application.name=payment-service

spring.datasource.url=${PAYMENT_DB_URL:jdbc:mysql://localhost:3306/paymentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ecommerce}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ecommerce123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.properties.request.timeout.ms=60000
spring.kafka.properties.retry.backoff.ms=5000


app.payment.stripe-secret-key=${STRIPE_SECRET_KEY:sk_test_51TEPFsFV3sOgB4cOX7UZRZ6eZrFId9yQjtFcafl1wZx8tBJNvOgVdc2l59oZr7GOtfrNWTjteVLNpYRqO5eQCi8w00IbDSguhc}

# Stripe redirects to these URLs after checkout
app.payment.stripe-success-url=${STRIPE_SUCCESS_URL:http://localhost:8080/api/payments/stripe/callback}
app.payment.stripe-cancel-url=${STRIPE_CANCEL_URL:http://localhost:3000/payment-cancelled}

# Internal service URLs
app.order-service.url=${ORDER_SERVICE_URL:http://localhost:8084}

management.endpoints.web.exposure.include=health,info