# Server
server.port=8080
spring.application.name=api-gateway

# Gateway Routes

# User Service: Public auth (no token needed)
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# User Service: Profile (authenticated)
spring.cloud.gateway.routes[1].id=user-service-profile
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/me,/api/users/me/**
spring.cloud.gateway.routes[1].filters[0].name=JwtAuthFilter

# Product Catalog: Public reads (GET)
spring.cloud.gateway.routes[2].id=product-catalog-public
spring.cloud.gateway.routes[2].uri=${PRODUCT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**,/api/categories/**
spring.cloud.gateway.routes[2].predicates[1]=Method=GET

# Product Catalog: Admin writes
spring.cloud.gateway.routes[3].id=product-catalog-admin
spring.cloud.gateway.routes[3].uri=${PRODUCT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/products/**,/api/categories/**
spring.cloud.gateway.routes[3].predicates[1]=Method=POST,PUT,PATCH,DELETE
spring.cloud.gateway.routes[3].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[3].filters[1].name=RoleFilter
spring.cloud.gateway.routes[3].filters[1].args.requiredRole=ROLE_ADMIN

# Cart Service
spring.cloud.gateway.routes[4].id=cart-service
spring.cloud.gateway.routes[4].uri=${CART_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.routes[4].filters[0].name=JwtAuthFilter

# Order Service
spring.cloud.gateway.routes[5].id=order-service
spring.cloud.gateway.routes[5].uri=${ORDER_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[5].filters[0].name=JwtAuthFilter

# Payment Service: Process
spring.cloud.gateway.routes[6].id=payment-service-process
spring.cloud.gateway.routes[6].uri=${PAYMENT_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payments/*/process,/api/payments,/api/payments/user
spring.cloud.gateway.routes[6].filters[0].name=JwtAuthFilter

# Payment Service: Admin (refund + access)
spring.cloud.gateway.routes[7].id=payment-service-admin
spring.cloud.gateway.routes[7].uri=${PAYMENT_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/payments/*/refund,/api/payments/*
spring.cloud.gateway.routes[7].predicates[1]=Method=GET,POST
spring.cloud.gateway.routes[7].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[7].filters[1].name=RoleFilter
spring.cloud.gateway.routes[7].filters[1].args.requiredRole=ROLE_ADMIN

# User Service: Admin APIs
spring.cloud.gateway.routes[8].id=user-service-admin
spring.cloud.gateway.routes[8].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[8].predicates[1]=Method=POST,GET,PUT,DELETE
spring.cloud.gateway.routes[8].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[8].filters[1].name=RoleFilter
spring.cloud.gateway.routes[8].filters[1].args.requiredRole=ROLE_ADMIN

# Global CORS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*

# Default Filters
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# JWT Config
app.jwt.secret=${JWT_SECRET:myVerySecretKeyThatShouldBeChangedInProductionAtLeast32Chars!}

# Redis (for blacklist check)
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG


