server.port=8080
spring.application.name=api-gateway

# User Service: Public auth (no token needed)
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# User Service: Profile (any authenticated user)
spring.cloud.gateway.routes[1].id=user-service-profile
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/me,/api/users/me/**
spring.cloud.gateway.routes[1].filters[0].name=JwtAuthFilter

# Product Catalog: Public reads
spring.cloud.gateway.routes[2].id=product-catalog-public
spring.cloud.gateway.routes[2].uri=${PRODUCT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**,/api/categories/**
spring.cloud.gateway.routes[2].predicates[1]=Method=GET

# Product Catalog: Admin writes (POST/PUT/DELETE)
spring.cloud.gateway.routes[3].id=product-catalog-admin
spring.cloud.gateway.routes[3].uri=${PRODUCT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/products/**,/api/categories/**
spring.cloud.gateway.routes[3].predicates[1]=Method=POST,PUT,PATCH,DELETE
spring.cloud.gateway.routes[3].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[3].filters[1].name=RoleFilter
spring.cloud.gateway.routes[3].filters[1].args.requiredRole=ROLE_ADMIN

app.jwt.secret=${JWT_SECRET:myVerySecretKeyThatShouldBeChangedInProductionAtLeast32Chars!}


