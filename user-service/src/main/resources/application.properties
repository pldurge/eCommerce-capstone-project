# Server
server.port=8081

# Application
spring.application.name=user-service

# Datasource
spring.datasource.url=${USER_DB_URL:jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ecommerce}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ecommerce123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.maximum-pool-size=5

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.properties.request.timeout.ms=60000
spring.kafka.properties.retry.backoff.ms=5000

# JWT
app.jwt.secret=${JWT_SECRET:myVerySecretKeyThatShouldBeChangedInProductionAtLeast32Chars!}
app.jwt.expiration=86400000
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:myRefreshSecretKeyThatShouldBeChangedInProductionToo!!}
app.jwt.refresh-expiration=604800000

# Actuator
management.endpoints.web.exposure.include=health,info
management.health.redis.enabled=false