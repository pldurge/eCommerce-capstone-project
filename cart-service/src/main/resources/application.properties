server.port=8083

spring.application.name=cart-service

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://root:rootpassword@localhost:27017/cartdb?authSource=admin}

#Redis
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.properties.request.timeout.ms=60000
spring.kafka.properties.retry.backoff.ms=5000

# Custom App Config
app.cart.ttl-seconds=86400

app.product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8082}

# Actuator
management.endpoints.web.exposure.include=health,info
management.health.mongo.enabled=false
management.health.redis.enabled=false